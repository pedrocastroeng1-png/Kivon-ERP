<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>KIVON ERP</title>
    <meta name="description" content="KIVON ERP - Sistema Integrado de Gestão" />
    <meta property="og:title" content="KIVON ERP" />
    <meta property="og:description" content="KIVON ERP - Sistema Integrado de Gestão" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KIVON ERP">
    <meta name="theme-color" content="#090909" />
    <style>
      #kivon-splash {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background-color: #090909;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        transition: opacity 0.6s ease-out;
      }
      #kivon-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .kivon-logo-container {
        width: 240px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        animation: logoEntrance 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      .kivon-logo-container img {
        width: 100%;
        height: auto;
      }
      .kivon-loading-bar-container {
        width: 160px;
        height: 2px;
        background-color: rgba(255, 255, 255, 0.05);
        border-radius: 2px;
        margin-top: 40px;
        overflow: hidden;
        position: relative;
        opacity: 0;
        animation: fadeIn 0.5s ease-out 0.8s forwards;
      }
      .kivon-loading-progress {
        position: absolute;
        top: 0; left: 0; bottom: 0;
        width: 40%;
        background-color: rgba(255, 255, 255, 0.8);
        border-radius: 2px;
        animation: minimalistProgress 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      @keyframes logoEntrance {
        0% { transform: scale(0.98); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      
      @keyframes fadeIn {
        to { opacity: 1; }
      }

      @keyframes minimalistProgress {
        0% { left: -40%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="kivon-splash">
      <div class="kivon-logo-container">
        <img src="/logo-kivon-white.png" alt="KIVON ERP" />
      </div>
      <div class="kivon-loading-bar-container">
        <div class="kivon-loading-progress"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove splash screen when React mounts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('kivon-splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 600);
          }
        }, 1200); // 1.2s minimal display for elegance
      });
    </script>
  </body>
</html>
